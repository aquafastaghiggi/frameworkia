version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frameworkia-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./workspaces:/app/workspaces
    ports:
      - "8000:80"
    depends_on:
      - db
      - redis
    networks:
      - frameworkia

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: frameworkia-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - db-volume:/var/lib/mysql
      - ./database/migrations.sql:/docker-entrypoint-initdb.d/001-schema.sql
    networks:
      - frameworkia
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: frameworkia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-volume:/data
    networks:
      - frameworkia
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: frameworkia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - frameworkia

volumes:
  db-volume:
  redis-volume:

networks:
  frameworkia:
    driver: bridge
